services:
  spam-digest:
    image: ghcr.io/gioxx/spam-digest:latest
    # build: .   # uncomment to build locally
    container_name: spam-digest
    restart: unless-stopped
    ports:
      - "8080:8080"          # status dashboard
    volumes:
      - spam_digest_data:/data   # persistent state (last run history)
    environment:
      TZ: Europe/Rome

      # --- Single mailbox ---
      IMAP_SERVER: imap.example.com
      IMAP_PORT: "993"
      IMAP_USE_SSL: "true"       # set to "false" if your server doesn't support SSL/TLS
      EMAIL_USER: you@example.com
      EMAIL_PASS: your-imap-password
      SPAM_FOLDER: Junk
      MAX_EMAILS: "100"

      # --- Email delivery (digest + management links) ---
      EMAIL_PROVIDER: smtp          # smtp | resend
      # SMTP provider
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_USER: you@example.com
      SMTP_PASS: your-smtp-password
      # Resend provider (used when EMAIL_PROVIDER=resend)
      # RESEND_API_KEY: re_xxxxxxxxxxxxxxxxxxxxxx
      # DIGEST_FROM must be on a verified Resend domain, or onboarding@resend.dev for quick tests
      # DIGEST_FROM: digest@yourdomain.com
      # DIGEST_TO: other@example.com  # optional: override digest recipient (defaults to EMAIL_USER)
      SEND_IF_EMPTY: "false"

      # --- AI (optional) ---
      AI_PROVIDER: none         # change to 'anthropic' to enable
      # AI_API_KEY: sk-ant-...
      # AI_MODEL: claude-haiku-4-5-20251001
      # AI_MAX_EMAILS: "50"

      # --- Schedule ---
      SCHEDULE_HOUR: "8"
      SCHEDULE_MIN: "0"
      SCHEDULE_DAY: "*"
      RUN_ON_START: "false"   # set to "true" to also run at container startup

    # --- Multi-mailbox example (uncomment and remove single mailbox vars above) ---
    # environment:
    #   MAILBOX_CONFIGS: |
    #     [
    #       {"imap_server":"imap.gmail.com","email_user":"a@gmail.com","email_pass":"app-password","spam_folder":"[Gmail]/Spam"},
    #       {"imap_server":"imap.outlook.com","email_user":"b@outlook.com","email_pass":"secret","spam_folder":"Junk","digest_to":"admin@example.com"},
    #       {"imap_server":"imap.myserver.com","email_user":"c@myserver.com","email_pass":"secret","imap_use_ssl":false,"imap_port":143}
    #     ]
    #   SMTP_HOST: smtp.gmail.com
    #   SMTP_PORT: "587"
    #   SMTP_USER: a@gmail.com
    #   SMTP_PASS: app-password

volumes:
  spam_digest_data:
